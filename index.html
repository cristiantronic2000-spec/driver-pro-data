<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Driver Pro">
<meta name="theme-color" content="#000000">
<title>Driver Pro — Cristian</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--black:#000;--white:#fff;--g50:#f7f7f7;--g100:#f0f0f0;--g200:#e0e0e0;--g400:#9e9e9e;--g600:#616161;--blue:#276EF1;--green:#00A651;--red:#E11900;--amber:#FFC043;--font:'Figtree',sans-serif;--nav-h:64px;--safe:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;background:#fff;font-family:var(--font);color:var(--black)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding-bottom:calc(var(--nav-h) + var(--safe) + 20px);display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe));background:#fff;border-top:1px solid var(--g200);display:flex;align-items:flex-start;padding-top:8px;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;font-family:var(--font)}
.ni svg{width:22px;height:22px;stroke:var(--g400);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.ni span{font-size:10px;color:var(--g400);font-weight:500;transition:color .15s}
.ni.on svg{stroke:var(--black)}
.ni.on span{color:var(--black);font-weight:700}
.ph{padding:16px 20px 8px;background:#fff;position:sticky;top:0;z-index:10}
.pt{font-size:28px;font-weight:900;letter-spacing:-.5px}
.stabs{display:flex;border-bottom:1px solid var(--g200);background:#fff;position:sticky;top:0;z-index:9;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:12px 16px;font-size:13px;font-weight:600;color:var(--g400);border:none;background:none;font-family:var(--font);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.stab.on{color:var(--black);border-bottom-color:var(--black)}
.card{background:#fff;border:1px solid var(--g200);border-radius:16px;padding:16px;margin:0 16px 12px}
.cflat{background:var(--g50);border-radius:16px;padding:16px;margin:0 16px 12px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:12px}
.mbox{background:var(--g50);border-radius:14px;padding:14px}
.mlbl{font-size:11px;color:var(--g600);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.mval{font-size:22px;font-weight:900;letter-spacing:-.5px}
.msub{font-size:11px;color:var(--g400);margin-top:2px}
.cg{color:var(--green)}
.cr{color:var(--red)}
.slbl{font-size:13px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;padding:0 20px;margin:16px 0 8px}
.trow{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--g100)}
.trow:last-child{border:none}
.tico{width:38px;height:38px;background:var(--g100);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0}
.tico svg{width:18px;height:18px;stroke:var(--g600);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tinfo{flex:1;min-width:0}
.tname{font-size:14px;font-weight:700}
.tmeta{font-size:12px;color:var(--g400);margin-top:1px}
.tamt{font-size:15px;font-weight:800;flex-shrink:0;margin-left:6px}
.tamt.g{color:var(--green)}
.tactions{display:flex;gap:4px;margin-left:6px;flex-shrink:0}
.tacbtn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:opacity .15s;flex-shrink:0}
.tacbtn:active{opacity:.6}
.tacedit{background:var(--g100)}
.tacdel{background:#FEE2E2}
.bdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}
.bc{background:#E6F4EA;color:#1B5E20}
